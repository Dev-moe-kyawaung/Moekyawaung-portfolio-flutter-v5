name: Moekyawaung_portfolio_flutter_v5
description: Moe Kyaw Aung — Senior Android Developer Portfolio (Flutter Web Pro Max)
publish_to: 'none'
version: 5.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Network
  dio: ^5.4.3+1
  http: ^1.2.1

  # Animations
  animate_do: ^3.3.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  rive: ^0.13.4

  # UI & UX
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  visibility_detector: ^0.4.0+2
  scroll_snap_list: ^0.9.2
  url_launcher: ^6.2.6
  font_awesome_flutter: ^10.7.0
  shimmer: ^3.0.0
  glassmorphism: ^3.0.0
  liquid_progress_indicator_v2: ^0.2.0
  
  simple_animations: ^5.0.2
  supercharged: ^2.1.1

  # Utility
  shared_preferences: ^2.2.3
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  equatable: ^2.0.5
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/data/
    - .env

  fonts:
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700

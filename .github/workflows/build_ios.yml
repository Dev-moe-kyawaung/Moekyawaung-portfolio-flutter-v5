name: 🍎 Build iOS

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🍎 Install CocoaPods
        run: |
          cd ios
          pod install

      - name: 🏗️ Build iOS (no code signing)
        run: flutter build ios --release --no-codesign

      - name: 📦 Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r MoeKyawAung-Portfolio.ipa Payload/

      - name: 📤 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: MoeKyawAung-Portfolio.ipa
          retention-days: 14
